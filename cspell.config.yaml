language: en
autoFix: false
checkComments: true
checkIdentifiers: true
checkJSXText: false
checkStrings: true
checkStringTemplates: true
ignoreImportProperties: true
ignoreImports: true
numSuggestions: 4
useGitignore: true
words:
  - Adguard
  - aflorzy
  - andrewflorzy
  - andrewtflores
  - astro
  - Bazarr
  - containerd
  - daytrackr
  - distros
  - Dockge
  - Florzy
  - flotrade
  - frontmatter
  - Gitea
  - homelab
  - homelabbers
  - homelabbing
  - Immich
  - Kuma
  - Macbook
  - newgrp
  - NGRX
  - Notifiarr
  - Overseerr
  - partytown
  - Prowlarr
  - Radarr
  - Requestrr
  - SLES
  - Sonarr
  - Tailscale
  - Truenas
  - usermod
ignoreRegExpList:
  - /^\s*```[\s\S]*?^\s*```/gm
files:
  - "**/*.{md,mdx}"
enableFiletypes:
  - mdx
